{% extends 'base.html' %}
{% block title %}AI Assistant{% endblock %}
{% block content %}
<h4 class="mb-4">AI Hotel Assistant</h4>

<div class="card" style="max-width: 700px;">
    <div class="card-body p-0">
        <div id="chat-messages" style="height: 420px; overflow-y: auto; padding: 1.5rem;">
            <div class="d-flex mb-3">
                <div class="bg-primary text-white rounded p-3" style="max-width:80%;">
                    Hi! I'm your hotel assistant. Ask me about room availability, services, or anything else I can help with.
                </div>
            </div>
        </div>
        <div class="border-top p-3">
            <div class="input-group">
                <input type="text" id="chat-input" class="form-control" placeholder="Type your message..." autocomplete="off">
                <button class="btn btn-primary" id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const messagesDiv = document.getElementById('chat-messages');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(text, isUser) {
    const div = document.createElement('div');
    div.className = 'd-flex mb-3 ' + (isUser ? 'justify-content-end' : '');
    const bubble = document.createElement('div');
    bubble.className = isUser
        ? 'bg-secondary text-white rounded p-3'
        : 'bg-light border rounded p-3';
    bubble.style.maxWidth = '80%';
    bubble.style.whiteSpace = 'pre-wrap';
    bubble.textContent = text;
    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    addMessage(message, true);
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    try {
        const res = await fetch('{{ url_for("chat.send") }}', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message})
        });
        const data = await res.json();
        addMessage(data.response, false);
    } catch {
        addMessage('Sorry, something went wrong.', false);
    }
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
    input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
{% endblock %}
