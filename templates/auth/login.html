{% extends 'base.html' %}
{% block title %}Login - Smart Hotel{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card p-4">
            <h3 class="mb-4 text-center"><i class="bi bi-building"></i> Smart Hotel</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <hr>
            <p class="text-center mb-0">No account? <a href="{{ url_for('auth.register') }}">Register</a></p>
        </div>
        <div class="card mt-3 p-3">
            <small class="text-muted"><strong>Demo accounts:</strong><br>
            guest@hotel.com / guest123<br>
            reception@hotel.com / staff123<br>
            staff@hotel.com / staff123<br>
            admin@hotel.com / admin123</small>
        </div>
    </div>
</div>
{% endblock %}
